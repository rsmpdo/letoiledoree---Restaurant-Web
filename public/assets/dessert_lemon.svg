        </radialGradient>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#c5a880"/>
          <stop offset="100%" stop-color="#9a7215"/>
        </linearGradient>
      </defs>
      <rect width="100%" height="100%" fill="url(#bg)"/>
      
      <!-- Visual elements -->
      <g transform="translate(300, 170)">
